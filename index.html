<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Mixed Doubles Pong — Wimbledon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#050c07;overflow:hidden;touch-action:none;position:fixed;}
#wrap{position:absolute;top:0;left:0;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;}
canvas{display:block;touch-action:none;}
#touchUI{display:none;width:100%;flex-shrink:0;flex-direction:row;border-top:1px solid rgba(107,45,139,0.4);background:rgba(5,12,7,0.95);}
#touchUI.show{display:flex;}
.tside{flex:1;display:flex;flex-direction:column;}
.tside-label{text-align:center;font:500 9px Georgia,serif;letter-spacing:.14em;text-transform:uppercase;color:rgba(107,45,139,0.6);padding:5px 0 2px;}
.trow{display:flex;flex:1;}
.tbtn{flex:1;display:flex;align-items:center;justify-content:center;font:700 22px Georgia,serif;color:rgba(250,246,238,0.4);background:none;border:none;outline:none;cursor:pointer;padding:0;min-height:44px;}
.tbtn.pressed,.tbtn:active{background:rgba(107,45,139,0.5);color:rgba(250,246,238,1);}
.tmid{width:2px;background:rgba(107,45,139,0.35);flex-shrink:0;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="touchUI">
    <div class="tside" id="side1">
      <div class="tside-label" id="lbl1">Player 1</div>
      <div class="trow">
        <button class="tbtn" id="b1u">▲</button>
        <button class="tbtn" id="b1d">▼</button>
      </div>
    </div>
    <div class="tmid"></div>
    <div class="tside" id="side2">
      <div class="tside-label" id="lbl2">Player 2</div>
      <div class="trow">
        <button class="tbtn" id="b2u">▲</button>
        <button class="tbtn" id="b2d">▼</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

// ── Touch helpers ──────────────────────────────
var T={p1u:false,p1d:false,p2u:false,p2d:false};
function bindBtn(id,key){
  var el=document.getElementById(id);
  if(!el)return;
  function on(e){e.preventDefault();T[key]=true;el.classList.add('pressed');}
  function off(e){e.preventDefault();T[key]=false;el.classList.remove('pressed');}
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',on);
  el.addEventListener('mouseup',off);
  el.addEventListener('mouseleave',off);
}
bindBtn('b1u','p1u'); bindBtn('b1d','p1d');
bindBtn('b2u','p2u'); bindBtn('b2d','p2d');

// ── Canvas setup ──────────────────────────────
var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var GW=900,GH=560,SH=64;
var CY=SH,CH=GH-SH,NETX=GW/2,MG=16;
var MC_PH=340,MC_PY=CY+(CH-MC_PH)/2-10;
var SC=1;
var isMobile=('ontouchstart' in window)||navigator.maxTouchPoints>0;
var TPAD_H=0;

function resize(){
  TPAD_H=0;
  var vw=window.innerWidth,vh=window.innerHeight;
  SC=Math.min(vw/GW,vh/GH);
  canvas.width=GW; canvas.height=GH;
  canvas.style.width=(GW*SC)+'px';
  canvas.style.height=(GH*SC)+'px';
  var tui=document.getElementById('touchUI');
  if(tui)tui.classList.remove('show');
  if(typeof posMenuBtns==='function')posMenuBtns();
  if(typeof positionLeaderboardOverlay==='function')positionLeaderboardOverlay();
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',function(){setTimeout(resize,300);});
resize();

// ── Backend config ─────────────────────────────
var API_FALLBACK='https://wimbledon-pong-staging.up.railway.app';
var API_BASE=location.protocol==='file:'?API_FALLBACK:'';
if(location.protocol!=='file:'){
  fetch('/health').then(function(r){if(!r.ok)API_BASE=API_FALLBACK;}).catch(function(){API_BASE=API_FALLBACK;});
}
function apiUrl(path){return API_BASE+path;}

// ── Colours ───────────────────────────────────
var C={
  court:'#0D2818',cream:'#FAF6EE',
  purple:'#6B2D8B',purpleL:'#8a3daf',gold:'#C9A84C',
  sbBg:'#07100a',lineA:'rgba(255,255,255,0.28)',lineB:'rgba(255,255,255,0.10)',
  ball:'#c8e32b'
};

// ── Scoring ───────────────────────────────────
var PT=['0','15','30','40'];
var sc;
function mkSc(){return{p1Pts:0,p2Pts:0,deuce:false,p1Adv:false,p2Adv:false,p1Games:0,p2Games:0,p1Sets:0,p2Sets:0,hist:[]};}
sc=mkSc();
function ptDisp(){
  if(sc.deuce){if(sc.p1Adv)return['AD','–'];if(sc.p2Adv)return['–','AD'];return['40','40'];}
  return[PT[sc.p1Pts]||'0',PT[sc.p2Pts]||'0'];
}
function givePoint(w){
  var me=w==='p1'?'p1Adv':'p2Adv',op=w==='p1'?'p2Adv':'p1Adv';
  if(sc.deuce){if(sc[me])return giveGame(w);if(sc[op]){sc[op]=false;return'point';}sc[me]=true;return'point';}
  w==='p1'?sc.p1Pts++:sc.p2Pts++;
  if(sc.p1Pts>=3&&sc.p2Pts>=3){sc.deuce=true;sc.p1Pts=3;sc.p2Pts=3;return'point';}
  if(sc.p1Pts>=4)return giveGame('p1');
  if(sc.p2Pts>=4)return giveGame('p2');
  return'point';
}
function giveGame(w){
  sc.p1Pts=0;sc.p2Pts=0;sc.deuce=false;sc.p1Adv=false;sc.p2Adv=false;
  w==='p1'?sc.p1Games++:sc.p2Games++;
  var g1=sc.p1Games,g2=sc.p2Games;
  var done=(g1>=6&&g1-g2>=2)||(g2>=6&&g2-g1>=2)||g1>=7||g2>=7;
  return done?giveSet(g1>g2?'p1':'p2'):'game';
}
function giveSet(w){
  sc.hist.push({p1:sc.p1Games,p2:sc.p2Games});
  sc.p1Games=0;sc.p2Games=0;
  w==='p1'?sc.p1Sets++:sc.p2Sets++;
  if(sc.p1Sets>=2||sc.p2Sets>=2)return'match';
  return'set';
}

// ── Arcade score (1P only) ─────────────────────
var arcade;
function mkArcade(){return{score:0,p1Streak:0,p2Streak:0};}
arcade=mkArcade();
function streakMultiplier(streak){
  if(streak>=6)return 5;
  if(streak>=3)return 3;
  return 1;
}
var streakPopup=null;
function showStreakPopup(text){
  streakPopup={text:text,until:performance.now()+1400};
}
function applyArcadePoint(who){
  if(MODE!=='1p')return;
  if(who==='p1'){
    arcade.p1Streak++;arcade.p2Streak=0;
    var s=arcade.p1Streak;
    arcade.score+=10*streakMultiplier(s);
    if(s===3)showStreakPopup('WINNING STREAK ×3');
    else if(s===6)showStreakPopup('WINNING STREAK ×5');
  }else{
    arcade.p2Streak++;arcade.p1Streak=0;
    var cs=arcade.p2Streak;
    arcade.score-=10*streakMultiplier(cs);
    if(cs===3)showStreakPopup('CPU STREAK ×3');
    else if(cs===6)showStreakPopup('CPU STREAK ×5');
  }
}
function drawStreakPopup(){
  if(!streakPopup)return;
  if(performance.now()>streakPopup.until){streakPopup=null;return;}
  var left=streakPopup.until-performance.now();
  var alpha=Math.min(1,left/350);
  ctx.save();ctx.globalAlpha=alpha;
  ctx.shadowColor='#c8e32b';ctx.shadowBlur=22;
  Txt(streakPopup.text,GW/2,CY+CH/2,'900 34px Georgia,serif','#c8e32b');
  ctx.restore();
}

// ── Paddles ───────────────────────────────────
// zone:'top' = net player covers top half of court
// zone:'bot' = baseline player covers bottom half
var PSPD=5.8;
var PDEFS=[
  {id:'p1Base',x:22, w:10,h:72,gender:'male',  team:'p1',zone:'top'},
  {id:'p1Net', x:230,w:10,h:56,gender:'female',team:'p1',zone:'bot'},
  {id:'p2Net', x:670,w:10,h:56,gender:'male',  team:'p2',zone:'top'},
  {id:'p2Base',x:878,w:10,h:72,gender:'female',team:'p2',zone:'bot'},
];
var pads={};
function zoneRange(zone,h){
  // Each paddle can cross the centre line by 10% of court height
  var overlap=CH*0.10;
  if(zone==='top') return [CY+MG+h/2+2,            CY+CH/2+overlap-h/2-2];
  else             return [CY+CH/2-overlap+h/2+2,   GH-MG-h/2-2];
}
function defaultPadX(id){return PDEFS.find(function(d){return d.id===id;}).x;}
function swap1pPaddleSides(){
  pads.p1Base.x=defaultPadX('p2Base');
  pads.p1Net.x=defaultPadX('p2Net');
  pads.p2Net.x=defaultPadX('p1Net');
  pads.p2Base.x=defaultPadX('p1Base');
}
function resetPads(){
  PDEFS.forEach(function(d){
    var r=zoneRange(d.zone,d.h);
    var startY=(r[0]+r[1])/2;
    pads[d.id]={x:d.x,w:d.w,h:d.h,gender:d.gender,team:d.team,zone:d.zone,y:startY};
  });
  if(MODE==='1p')swap1pPaddleSides();
}
resetPads();
function padIsLeft(p){return p.x<NETX;}
function clampPad(p){
  var r=zoneRange(p.zone,p.h);
  p.y=Math.max(r[0],Math.min(r[1],p.y));
}
function movePads(d1,d2){
  ['p1Base','p1Net'].forEach(function(k){pads[k].y+=d1;clampPad(pads[k]);});
  ['p2Net','p2Base'].forEach(function(k){pads[k].y+=d2;clampPad(pads[k]);});
}

// ── AI ────────────────────────────────────────
var aiErr=0,aiErrT=0;
function aiUpdate(){
  var react=ball.vx<0?1.0:0.25,spd=PSPD*0.82*react;
  ['p2Net','p2Base'].forEach(function(k){
    var p=pads[k],tgt=ball.y+aiErr;
    if(p.y<tgt-3)p.y+=spd;else if(p.y>tgt+3)p.y-=spd;
    clampPad(p);
  });
  if(--aiErrT<=0){aiErr=(Math.random()-0.5)*120;aiErrT=40+Math.random()*75|0;}
}

// ── Ball ──────────────────────────────────────
var BR=6,BSPD0=5.2,BMAX=15,BACC=0.22;
var ball={x:0,y:0,vx:0,vy:0};
var trail=[],flash=0;
function launchBall(to){
  ball.x=NETX;ball.y=CY+CH/2+(Math.random()-0.5)*CH*0.22;
  var ang=(Math.random()-0.5)*0.5;
  ball.vx=(to==='p1'?-1:1)*BSPD0;ball.vy=Math.sin(ang)*2.8;trail=[];
}
function stepBall(){
  trail.unshift({x:ball.x,y:ball.y});if(trail.length>9)trail.pop();
  ball.x+=ball.vx;ball.y+=ball.vy;
  if(ball.y-BR<CY+MG+1){ball.y=CY+MG+1+BR;ball.vy=Math.abs(ball.vy);}
  if(ball.y+BR>GH-MG-1){ball.y=GH-MG-1-BR;ball.vy=-Math.abs(ball.vy);}
  PDEFS.forEach(function(d){hitPad(pads[d.id],padIsLeft(pads[d.id]));});
  if(MODE==='1p'){
    if(ball.x<-25){onPoint('p1');return;}
    if(ball.x>GW+25){onPoint('p2');return;}
  }else{
    if(ball.x<-25){onPoint('p2');return;}
    if(ball.x>GW+25){onPoint('p1');return;}
  }
}
function hitPad(p,isLeft){
  if(isLeft&&ball.vx>0)return;if(!isLeft&&ball.vx<0)return;
  var hw=p.w/2,hh=p.h/2;
  if(ball.x+BR<p.x-hw||ball.x-BR>p.x+hw)return;
  if(ball.y+BR<p.y-hh||ball.y-BR>p.y+hh)return;
  ball.vx=-ball.vx;
  var rel=(ball.y-p.y)/hh;ball.vy=rel*5.8;
  var sp=Math.hypot(ball.vx,ball.vy);
  if(sp<BMAX){var f=(sp+BACC)/sp;ball.vx*=f;ball.vy*=f;}
  ball.x=isLeft?p.x+hw+BR+1:p.x-hw-BR-1;flash=10;
}

// ── State ─────────────────────────────────────
var STATE='splash',MODE='1p';
var exitConfirmOpen=false;
var mobileMenuBtnRect=null;
var exitConfirmRects=null;
var activeTouches={};
var ptTimer=0,ptMsg='',ptSub='',ptNext='playing',setEndTimer=0;
var matchEndBtnRect=null;
var leaderboardCache=null,leaderboardFetchState='idle',arcadeSubmitted=false;
var nameInputEl=null,submitBtnEl=null,leaderboardDiv=null;
var lbArcadeMode=false;
var arcadeEndAt=0;
var ARCADE_MS=90000;

function startPlaying(){
  STATE='playing';
  resetPads();
  launchBall(Math.random()<0.5?'p1':'p2');
  if(MODE==='1p')arcadeEndAt=performance.now()+ARCADE_MS;
}
function onPoint(who){
  applyArcadePoint(who);
  if(MODE==='1p'){
    resetPads();
    launchBall(who==='p1'?'p2':'p1');
    return;
  }
  var r=givePoint(who);
  var wname=who==='p1'?'Player 1':'Player 2';
  ptMsg=(who==='p1'?'◀  ':'▶  ')+wname+' scores';
  ptSub='';ptNext='playing';var pause=60;
  if(r==='point'){var d=ptDisp();ptSub=d[0]+' – '+d[1];}
  if(r==='game'){ptMsg+=' — Game!';ptSub='Games: '+sc.p1Games+' – '+sc.p2Games;pause=60;}
  if(r==='set'){ptMsg+=' — Set!';var h=sc.hist[sc.hist.length-1];ptSub='Set: '+h.p1+' – '+h.p2;pause=90;ptNext='setEnd';}
  if(r==='match'){ptNext='matchEnd';pause=9999;}
  STATE='pointEnd';ptTimer=pause;resetPads();launchBall(who==='p1'?'p2':'p1');
}
function arcadeTimeLeftMs(){return Math.max(0,arcadeEndAt-performance.now());}
function formatArcadeTime(ms){
  var secs=Math.ceil(ms/1000),m=Math.floor(secs/60),s=secs%60;
  return m+':'+(s<10?'0':'')+s;
}
function onArcadeTimeUp(){
  if(MODE!=='1p'||STATE!=='playing')return;
  STATE='arcadeResult';
  arcadeSubmitted=false;
  leaderboardCache=null;
  leaderboardFetchState='loading';
  removeNameEntryUI();
  menuDiv.style.display='none';
  fetchLeaderboard(10).then(function(data){
    leaderboardCache=data;leaderboardFetchState='done';
    if(qualifiesForTop10())showNameEntryUI();
    else showArcadeLeaderboard();
  }).catch(function(){leaderboardFetchState='error';showArcadeLeaderboard();});
}
function showArcadeLeaderboard(){
  STATE='arcadeLeaderboard';
  menuDiv.style.display='none';
  buildLeaderboardOverlay(true);
  positionLeaderboardOverlay();
  var back=leaderboardDiv&&leaderboardDiv.querySelector('#lbBack');
  if(back)back.textContent='TAP TO CONTINUE';
  if(leaderboardCache)renderLeaderboardList(leaderboardCache);
  else fetchAndRenderLeaderboard();
}
function hideArcadeLeaderboard(){lbArcadeMode=false;removeLeaderboardOverlay();goMenu();}
function drawFrozenGame(){
  drawCourt();
  PDEFS.forEach(function(d){drawPad(pads[d.id]);});
  drawBall();drawSB();
  ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(0,CY,GW,CH);
}
function drawArcadeResult(){
  drawFrozenGame();
  Txt("TIME'S UP!",GW/2,CY+CH/2-36,'bold 28px Georgia,serif',C.cream);
  Txt(String(arcade.score),GW/2,CY+CH/2+4,'900 36px Georgia,serif',C.gold);
  if(leaderboardFetchState==='loading'){
    Txt('Checking leaderboard…',GW/2,CY+CH/2+38,'italic 13px Georgia,serif','#888');
  }else if(nameInputEl){
    Txt('Enter your name for the top 10',GW/2,CY+CH/2+38,'italic 13px Georgia,serif',C.cream);
  }
}

// ── Leaderboard ────────────────────────────────
function fetchLeaderboard(limit){
  function loadFrom(base, triedFallback){
    var url=base+'/api/scores?limit='+limit;
    return fetch(url).then(function(r){
      if(!r.ok)throw new Error('leaderboard HTTP '+r.status);
      return r.json();
    }).then(function(data){
      if(!Array.isArray(data))throw new Error('leaderboard invalid JSON');
      return data;
    }).catch(function(err){
      if(!triedFallback&&base!==API_FALLBACK){
        API_BASE=API_FALLBACK;
        return loadFrom(API_FALLBACK,true);
      }
      throw err;
    });
  }
  return loadFrom(API_BASE,false);
}
function renderLeaderboardList(data){
  if(!leaderboardDiv)return;
  var list=leaderboardDiv.querySelector('#lbList');
  if(!list)return;
  if(leaderboardFetchState==='loading'&&!data){list.textContent='Loading…';positionLeaderboardOverlay();return;}
  if(!Array.isArray(data)){list.textContent='Failed to load leaderboard.';positionLeaderboardOverlay();return;}
  if(!data.length){list.textContent='No scores yet — be the first!';positionLeaderboardOverlay();return;}
  var rows=data.map(function(e,i){
    var color=i===0?'#C9A84C':'#FAF6EE';
    return '<div style="display:flex;justify-content:space-between;padding:4px 4px;color:'+color+';">'+
      '<span>'+(i+1)+'. '+escapeHtml(e.name)+'</span><span>'+e.score+'</span></div>';
  });
  list.innerHTML=rows.join('');
  positionLeaderboardOverlay();
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function onEnterMatchEnd(){
  arcadeSubmitted=false;
  leaderboardCache=null;leaderboardFetchState='idle';
  removeNameEntryUI();
  if(MODE!=='1p')return;
  leaderboardFetchState='loading';
  fetchLeaderboard(10).then(function(data){
    leaderboardCache=data;leaderboardFetchState='done';
    maybeShowNameEntry();
  }).catch(function(){leaderboardFetchState='error';});
}
function qualifiesForTop10(){
  if(!leaderboardCache)return true;
  if(leaderboardCache.length<10)return true;
  var lowest=leaderboardCache[leaderboardCache.length-1].score;
  return arcade.score>lowest;
}
function maybeShowNameEntry(){
  if(MODE!=='1p'||arcadeSubmitted)return;
  if(!qualifiesForTop10())return;
  showNameEntryUI();
}
function showNameEntryUI(){
  if(nameInputEl)return;
  nameInputEl=document.createElement('input');
  nameInputEl.maxLength=12;
  nameInputEl.placeholder='Your name';
  nameInputEl.style.cssText='position:absolute;z-index:11;font:600 14px Georgia,serif;'+
    'padding:8px 12px;border-radius:3px;border:1.5px solid #C9A84C;'+
    'background:#0D2818;color:#FAF6EE;text-align:center;width:150px;outline:none;';
  submitBtnEl=document.createElement('button');
  submitBtnEl.textContent='SUBMIT SCORE';
  submitBtnEl.style.cssText='position:absolute;z-index:11;font:700 12px Georgia,serif;'+
    'letter-spacing:.12em;text-transform:uppercase;padding:9px 16px;'+
    'background:#6B2D8B;border:1.5px solid #8a3daf;color:#FAF6EE;'+
    'border-radius:3px;cursor:pointer;outline:none;';
  function go(e){e.preventDefault();submitArcadeScore();}
  submitBtnEl.addEventListener('click',go);
  submitBtnEl.addEventListener('touchstart',go,{passive:false});
  document.getElementById('wrap').appendChild(nameInputEl);
  document.getElementById('wrap').appendChild(submitBtnEl);
  positionNameEntryUI();
}
function positionNameEntryUI(){
  if(!nameInputEl)return;
  var rect=canvas.getBoundingClientRect();
  var cx=rect.left+GW/2*SC;
  var cy=rect.top+(STATE==='arcadeResult'?(CY+CH/2+72)*SC:(MC_PY+230)*SC);
  nameInputEl.style.left=(cx-75)+'px';
  nameInputEl.style.top=(cy)+'px';
  submitBtnEl.style.left=(cx-75)+'px';
  submitBtnEl.style.top=(cy+44)+'px';
}
function removeNameEntryUI(){
  if(nameInputEl){nameInputEl.remove();nameInputEl=null;}
  if(submitBtnEl){submitBtnEl.remove();submitBtnEl=null;}
}
function submitArcadeScore(){
  var name=(nameInputEl.value||'Player').trim().slice(0,12)||'Player';
  submitBtnEl.disabled=true;submitBtnEl.textContent='SUBMITTING…';
  fetch(apiUrl('/api/scores'),{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name:name,score:arcade.score})
  }).then(function(r){
    if(!r.ok)throw new Error('submit HTTP '+r.status);
    return r.json();
  }).then(function(){
      arcadeSubmitted=true;removeNameEntryUI();
      return fetchLeaderboard(10).then(function(data){
        leaderboardCache=data;
        showArcadeLeaderboard();
      });
    }).catch(function(){
      submitBtnEl.disabled=false;submitBtnEl.textContent='SUBMIT SCORE';
    });
}
function showLeaderboard(){
  STATE='leaderboard';menuDiv.style.display='none';
  buildLeaderboardOverlay();
  positionLeaderboardOverlay();
  fetchAndRenderLeaderboard();
}
function hideLeaderboard(){
  STATE='menu';lbArcadeMode=false;removeLeaderboardOverlay();menuDiv.style.display='flex';
}
function buildLeaderboardOverlay(arcadeMode){
  lbArcadeMode=!!arcadeMode;
  if(leaderboardDiv){
    var back=leaderboardDiv.querySelector('#lbBack');
    if(back)back.textContent=lbArcadeMode?'TAP TO CONTINUE':'BACK';
    var list=leaderboardDiv.querySelector('#lbList');
    if(list)list.textContent='Loading…';
    return;
  }
  leaderboardDiv=document.createElement('div');
  leaderboardDiv.style.cssText='position:absolute;z-index:11;width:340px;max-width:92vw;'+
    'box-sizing:border-box;display:flex;flex-direction:column;overflow:hidden;'+
    'background:rgba(5,12,7,0.97);border:1.5px solid #6B2D8B;border-radius:8px;'+
    'padding:18px 22px;font-family:Georgia,serif;color:#FAF6EE;text-align:center;';
  leaderboardDiv.innerHTML='<div id="lbHeader" style="flex-shrink:0;font:bold 20px Georgia,serif;color:#FAF6EE;'+
    'border-bottom:2px solid #C9A84C;padding-bottom:8px;margin-bottom:10px;">LEADERBOARD</div>'+
    '<div id="lbList" style="flex:1 1 auto;overflow-y:auto;min-height:0;max-height:100%;'+

function Txt(str,x,y,font,col,align,base){
  ctx.font=font;ctx.fillStyle=col;
  ctx.textAlign=align||'center';ctx.textBaseline=base||'middle';
  ctx.fillText(str,x,y);
}
function drawLogo(cx,cy,r){
  ctx.save();
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle='#4f2683';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,r*.64,0,Math.PI*2);
  ctx.strokeStyle='#fff';ctx.lineWidth=Math.max(1,r*.033);ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,r*.63,0,Math.PI*2);ctx.fillStyle='#0d6635';ctx.fill();
  ctx.font='bold '+(r*.84)+'px Georgia,serif';
  ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('W',cx,cy+r*.06);ctx.restore();
}
function rrect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}

function wrapText(text,maxWidth,font){
  ctx.font=font;
  var words=text.split(' '),lines=[],line='';
  words.forEach(function(w){
    var test=line?line+' '+w:w;
    if(ctx.measureText(test).width>maxWidth&&line){lines.push(line);line=w;}
    else line=test;
  });
  if(line)lines.push(line);
  return lines;
}

function inRect(cx,cy,r){
  return r&&cx>=r.x&&cx<=r.x+r.w&&cy>=r.y&&cy<=r.y+r.h;
}

function pointerToGame(clientX,clientY){
  var rect=canvas.getBoundingClientRect();
  return{x:(clientX-rect.left)/SC,y:(clientY-rect.top)/SC};
}

function playerFromX(x){
  if(MODE==='1p')return x>=NETX?2:0;
  return x<NETX?1:2;
}

function syncTouchDirections(){
  T.p1u=T.p1d=T.p2u=T.p2d=false;
  Object.keys(activeTouches).forEach(function(id){
    var t=activeTouches[id];
    if(t.player===1){if(t.dir<0)T.p1u=true;if(t.dir>0)T.p1d=true;}
    else if(t.player===2){if(t.dir<0)T.p2u=true;if(t.dir>0)T.p2d=true;}
  });
}

function clearAllTouches(){
  activeTouches={};
  T.p1u=T.p1d=T.p2u=T.p2d=false;
}

function handlePlayingTouchStart(touch){
  var g=pointerToGame(touch.clientX,touch.clientY);
  if(g.y<CY)return;
  var player=playerFromX(g.x);
  if(!player)return;
  activeTouches[touch.identifier]={player:player,lastY:g.y,dir:0};
  syncTouchDirections();
}

function handlePlayingTouchMove(touch){
  var entry=activeTouches[touch.identifier];
  if(!entry)return;
  var g=pointerToGame(touch.clientX,touch.clientY);
  var dy=g.y-entry.lastY;
  entry.lastY=g.y;
  entry.dir=dy<-1?-1:dy>1?1:0;
  syncTouchDirections();
}

function handlePlayingTouchEnd(id){
  delete activeTouches[id];
  syncTouchDirections();
}

function handleCanvasPointer(clientX,clientY){
  var g=pointerToGame(clientX,clientY);
  if(STATE==='splash'){dismissSplash();return true;}
  if(exitConfirmOpen&&exitConfirmRects){
    if(inRect(g.x,g.y,exitConfirmRects.yes)){closeExitConfirm();goMenu();return true;}
    if(inRect(g.x,g.y,exitConfirmRects.no)){closeExitConfirm();return true;}
    return true;
  }
  if(isMobile&&mobileGameActive()&&inRect(g.x,g.y,mobileMenuBtnRect)){
    openExitConfirm();return true;
  }
  if(STATE==='arcadeLeaderboard'){hideArcadeLeaderboard();return true;}
  if(STATE==='matchEnd'&&inBtn(g.x,g.y)){goMenu();return true;}
  return false;
}

  ctx.strokeStyle=C.lineA;ctx.lineWidth=1.5;ctx.strokeRect(MG,CY+MG,GW-MG*2,CH-MG*2);
  ctx.strokeStyle=C.lineB;ctx.lineWidth=1;

  });

function drawPad(p){
  var x=p.x, top=p.y-p.h/2, s=p.h/72;
  ctx.save();
  ctx.shadowColor='rgba(250,246,238,0.55)';ctx.shadowBlur=12;

  // ── Head ──
  var hr=7*s, headY=top+hr+1;
  ctx.fillStyle=C.cream;
  ctx.beginPath();ctx.arc(x,headY,hr,0,Math.PI*2);ctx.fill();

  // ── Neck ──
  var neckTop=headY+hr, neckH=5*s;
  ctx.fillRect(x-2*s,neckTop,4*s,neckH);

  // ── Torso ──
  var torsoTop=neckTop+neckH, torsoH=18*s;
  var sw=10*s, ww=7*s;
  ctx.beginPath();
  ctx.moveTo(x-sw/2,torsoTop);ctx.lineTo(x+sw/2,torsoTop);
  ctx.lineTo(x+ww/2,torsoTop+torsoH);ctx.lineTo(x-ww/2,torsoTop+torsoH);
  ctx.closePath();ctx.fill();
  var hipY=torsoTop+torsoH;

  if(p.gender==='female'){
    // Ponytail
    ctx.save();ctx.strokeStyle=C.cream;ctx.lineWidth=3*s;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(x+hr*0.4,headY-hr*0.4);
    ctx.quadraticCurveTo(x+hr*2,headY-hr,x+hr*1.5,headY+hr*0.5);
    ctx.stroke();ctx.restore();
    // Skirt
    var skirtH=18*s, skirtW=16*s;
    ctx.fillStyle=C.cream;
    ctx.beginPath();
    ctx.moveTo(x-ww/2,hipY);ctx.lineTo(x+ww/2,hipY);
    ctx.lineTo(x+skirtW/2,hipY+skirtH);ctx.lineTo(x-skirtW/2,hipY+skirtH);
    ctx.closePath();ctx.fill();
    // Purple waistband
    ctx.fillStyle=C.purple;ctx.fillRect(x-sw/2-1,hipY,sw+2,2.5*s);
    ctx.fillStyle=C.cream;
    // Legs
    var lt=hipY+skirtH, lh=p.h-(lt-top);
    ctx.fillRect(x-5*s,lt,3.5*s,lh);ctx.fillRect(x+1.5*s,lt,3.5*s,lh);

  } else {
    // Shorts
    var shortsH=14*s;
    ctx.fillStyle=C.cream;
    ctx.beginPath();
    ctx.moveTo(x-ww/2,hipY);ctx.lineTo(x+ww/2,hipY);
    ctx.lineTo(x+6*s,hipY+shortsH);ctx.lineTo(x-6*s,hipY+shortsH);
    ctx.closePath();ctx.fill();
    // Centre seam
    ctx.save();ctx.strokeStyle='rgba(107,45,139,0.55)';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(x,hipY+2);ctx.lineTo(x,hipY+shortsH);ctx.stroke();ctx.restore();
    // Legs
    var lt2=hipY+shortsH, lh2=p.h-(lt2-top);
    ctx.fillStyle=C.cream;
    ctx.fillRect(x-5*s,lt2,3.5*s,lh2);ctx.fillRect(x+1.5*s,lt2,3.5*s,lh2);
  }

  // ── Racket arm ──
  var armY=torsoTop+6*s;
  var dir=padIsLeft(p)?1:-1;
  ctx.save();
  ctx.strokeStyle=C.cream;ctx.lineWidth=2.5*s;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x+(sw/2)*dir,armY);ctx.lineTo(x+(sw/2+8*s)*dir,armY);ctx.stroke();
  // Racket head
  ctx.strokeStyle=C.gold;ctx.lineWidth=1.8;ctx.shadowColor=C.gold;ctx.shadowBlur=4;
  ctx.beginPath();ctx.ellipse(x+(sw/2+13*s)*dir,armY,4.5*s,7*s,Math.PI/2,0,Math.PI*2);
  ctx.stroke();
  ctx.restore();

  ctx.restore();
}

function mkBtn(label,onClick,variant){
  var b=document.createElement('button');
  b.textContent=label;

    'padding:14px 24px;color:#FAF6EE;border-radius:3px;cursor:pointer;min-width:118px;outline:none;'+
    'transition:transform .15s ease,box-shadow .15s ease;';
  if(variant==='1p'){
    b.style.cssText=base+'background:#0D2818;border:1.5px solid #C9A84C;';
  }else if(variant==='lb'){
    b.style.cssText=base+'background:#6B2D8B;border:1.5px solid #8a3daf;';
  }else{
    b.style.cssText=base+'background:transparent;border:1.5px solid #6B2D8B;';
  }
  b.addEventListener('mouseenter',function(){b.style.transform='translateY(-1px)';});
  b.addEventListener('mouseleave',function(){b.style.transform='';});
  function go(e){e.preventDefault();onClick();}
  b.addEventListener('click',go);
  b.addEventListener('touchstart',go,{passive:false});
  return b;
}

    if(s2)s2.style.opacity='1';
    if(l1)l1.textContent='CPU';
    if(l2)l2.textContent='YOU';
  }else{
    if(s1)s1.style.opacity='1';
    if(s2)s2.style.opacity='1';
    if(l1)l1.textContent='Player 1';
    if(l2)l2.textContent='Player 2';
  }
  startPlaying();
}
function goMenu(){
  STATE='menu';sc=mkSc();arcade=mkArcade();streakPopup=null;
  lbArcadeMode=false;arcadeEndAt=0;
  closeExitConfirm();clearAllTouches();
  removeNameEntryUI();removeLeaderboardOverlay();
  menuDiv.style.display='flex';
  var s1=document.getElementById('side1');
  var s2=document.getElementById('side2');
  var l1=document.getElementById('lbl1');
  var l2=document.getElementById('lbl2');
  if(s1)s1.style.opacity='1';
  if(s2)s2.style.opacity='1';
  if(l1)l1.textContent='Player 1';
  if(l2)l2.textContent='Player 2';
}

function inBtn(cx,cy){
  if(!matchEndBtnRect)return false;
  var r=matchEndBtnRect;
  return cx>=r.x&&cx<=r.x+r.w&&cy>=r.y&&cy<=r.y+r.h;
}
function dismissArcadeLeaderboardFromPointer(clientX,clientY){
  if(STATE!=='arcadeLeaderboard')return false;
  hideArcadeLeaderboard();
  return true;
}
canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(handleCanvasPointer(e.changedTouches[0].clientX,e.changedTouches[0].clientY))return;
  if(exitConfirmOpen||STATE==='splash')return;
  if(isMobile&&STATE==='playing'){
    for(var i=0;i<e.changedTouches.length;i++)handlePlayingTouchStart(e.changedTouches[i]);
  }
},{passive:false});
canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(exitConfirmOpen||STATE!=='playing'||!isMobile)return;
  for(var i=0;i<e.changedTouches.length;i++)handlePlayingTouchMove(e.changedTouches[i]);
},{passive:false});
canvas.addEventListener('touchend',function(e){
  e.preventDefault();
  for(var i=0;i<e.changedTouches.length;i++)handlePlayingTouchEnd(e.changedTouches[i].identifier);
},{passive:false});
canvas.addEventListener('touchcancel',function(e){
  for(var i=0;i<e.changedTouches.length;i++)handlePlayingTouchEnd(e.changedTouches[i].identifier);
},{passive:false});
canvas.addEventListener('click',function(e){
  if(handleCanvasPointer(e.clientX,e.clientY))return;
});

// ── Scenes ────────────────────────────────────
function posMenuBtns(){
  if(!menuDiv)return;
  menuDiv.style.top='auto';
  menuDiv.style.bottom=(TPAD_H+16)+'px';
}

function drawMenu(){
  ctx.fillStyle=C.sbBg;ctx.fillRect(0,0,GW,SH);
  ctx.fillStyle=C.purple;ctx.fillRect(0,SH-2,GW,2);
  drawLogo(30,SH/2,22);
  drawCourt();
  ctx.fillStyle='rgba(0,0,0,0.68)';ctx.fillRect(0,CY,GW,CH);
  drawLogo(GW/2,CY+CH/2-75,54);
  Txt('MIXED DOUBLES PONG',GW/2,CY+CH/2+10,'bold 32px Georgia,serif',C.cream);
  Txt('Wimbledon Edition',GW/2,CY+CH/2+42,'italic 15px Georgia,serif',C.gold);
  Txt('1 Player: 90s arcade  ·  2 Players: tennis match',GW/2,CY+CH/2+68,'400 11px Georgia,serif','#2d4535');
}
function drawPlaying(){drawCourt();PDEFS.forEach(function(d){drawPad(pads[d.id]);});drawBall();drawSB();drawStreakPopup();}
function drawPtEnd(){drawCourt();PDEFS.forEach(function(d){drawPad(pads[d.id]);});drawSB();panel(ptMsg,ptSub,'');}
function drawSetEnd(){
  drawCourt();drawSB();
  var w=sc.p1Sets>sc.p2Sets?'Player 1':'Player 2';
  var h=sc.hist[sc.hist.length-1];
  panel('Set to '+w,h?h.p1+' – '+h.p2:'','Next set starting…');
}
function drawMatchEnd(){
  drawCourt();drawSB();
  var w=sc.p1Sets>=2?'Player 1':'Player 2';

  // Dim overlay
  ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(0,CY,GW,CH);

  // Card
  var pw=500,ph=MC_PH,px=(GW-pw)/2,py=MC_PY;
  ctx.fillStyle='rgba(5,12,7,0.97)';rrect(px,py,pw,ph,10);ctx.fill();
  ctx.strokeStyle=C.gold;ctx.lineWidth=1.8;rrect(px,py,pw,ph,10);ctx.stroke();
  // Gold top bar
  ctx.fillStyle=C.gold;ctx.fillRect(px,py,pw,3);

  // Trophy
  ctx.save();ctx.font='46px Georgia,serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor=C.gold;ctx.shadowBlur=18;
  ctx.fillText('🏆',GW/2,py+52);ctx.restore();

  // Winner name
  ctx.save();ctx.shadowColor=C.gold;ctx.shadowBlur=14;
  Txt(w+' wins!',GW/2,py+102,'bold 30px Georgia,serif',C.cream);ctx.restore();

  // Set score history
  var scoreStr='Sets  '+sc.p1Sets+' – '+sc.p2Sets;
  if(sc.hist.length>0){
    var parts=sc.hist.map(function(h){return h.p1+'-'+h.p2;});
    scoreStr+='   ('+parts.join('  '+String.fromCharCode(183)+'  ')+')';
  }
  Txt(scoreStr,GW/2,py+136,'italic 14px Georgia,serif',C.gold);

  // Arcade score & leaderboard rank (1P only)
  if(MODE==='1p'){
    Txt('Arcade Score: '+arcade.score,GW/2,py+170,'600 16px Georgia,serif',C.gold);
    if(leaderboardFetchState==='done'){
      if(arcadeSubmitted){
        Txt('Score submitted!',GW/2,py+196,'italic 13px Georgia,serif',C.cream);
      }else{
        var rank=leaderboardCache.findIndex(function(e){return arcade.score>e.score;});
        var rankText = rank===-1
          ? (leaderboardCache.length<10?'Top 10!':'Outside Top 10')
          : 'Rank #'+(rank+1)+' on the leaderboard!';
        Txt(rankText,GW/2,py+196,'italic 13px Georgia,serif',C.cream);
      }
    }else if(leaderboardFetchState==='loading'){
      Txt('Loading leaderboard…',GW/2,py+196,'italic 12px Georgia,serif','#666');
    }
  }

  // Play Again button
  var bw=200,bh=44,bx=(GW-bw)/2,by=py+ph-66;
  matchEndBtnRect={x:bx,y:by,w:bw,h:bh};
  ctx.fillStyle='rgba(107,45,139,0.85)';rrect(bx,by,bw,bh,5);ctx.fill();
  ctx.strokeStyle=C.purpleL;ctx.lineWidth=1.2;rrect(bx,by,bw,bh,5);ctx.stroke();
  Txt('PLAY AGAIN',GW/2,by+bh/2,'700 13px Georgia,serif',C.cream);
}

// ── Main loop ─────────────────────────────────
function tick(){
  try{
    requestAnimationFrame(tick);
    ctx.clearRect(0,0,GW,GH);
    switch(STATE){
      case'splash':
        drawSplash();break;
      case'menu':
        drawMenu();posMenuBtns();break;
      case'playing':{
        if(MODE==='1p'&&arcadeTimeLeftMs()<=0){onArcadeTimeUp();if(STATE==='arcadeResult')drawArcadeResult();break;}
        if(!exitConfirmOpen){
          var dy=getDy();
          movePads(dy[0],MODE==='2p'?dy[1]:0);
          if(MODE==='1p')aiUpdate();
          stepBall();
        }
        if(STATE==='playing')drawPlaying();
        break;}
      case'arcadeResult':
        drawArcadeResult();positionNameEntryUI();break;
      case'arcadeLeaderboard':
        drawFrozenGame();positionLeaderboardOverlay();
        if(leaderboardCache&&leaderboardDiv){
          var lb=leaderboardDiv.querySelector('#lbList');
          if(lb&&lb.textContent==='Loading…')renderLeaderboardList(leaderboardCache);
        }
        break;
      case'pointEnd':
        if(!exitConfirmOpen&&--ptTimer<=0){
          if(ptNext==='setEnd'){STATE='setEnd';setEndTimer=180;}
          else if(ptNext==='matchEnd'){STATE='matchEnd';onEnterMatchEnd();}
          else startPlaying();
        }
        drawPtEnd();break;
      case'setEnd':
        if(!exitConfirmOpen&&--setEndTimer<=0)startPlaying();
        drawSetEnd();break;
      case'matchEnd':
        drawMatchEnd();positionNameEntryUI();break;
      case'leaderboard':
        drawMenu();posMenuBtns();positionLeaderboardOverlay();break;
    }
    if(exitConfirmOpen)drawExitConfirm();
  }catch(err){
    // Soft-catch rendering errors without crashing the loop
    console.error('tick error:',err);
  }
}
tick();

})();
</script>
